<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마음 온도계: 타인의 신발을 신어봐! 👟</title>
    <style>
        :root {
            --primary-color: #ff8787; /* 따뜻한 핑크 */
            --bg-color: #fff5f5;
            --card-bg: #ffffff;
            --text-color: #333;
            --accent-color: #fab005; /* 상황판 노랑 */
            --thought-color: #fa5252; /* 속마음 빨강 */
        }

        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 600px;
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(255,135,135,0.2);
            text-align: center;
            transition: all 0.3s ease;
        }

        h1 { color: var(--primary-color); font-size: 1.8rem; margin-bottom: 10px; }
        .sub-title { color: #888; margin-bottom: 30px; font-size: 1rem; }

        /* 마음 온도계 스타일 */
        .meter-container {
            background: #eee;
            border-radius: 20px;
            height: 30px;
            width: 100%;
            overflow: hidden;
            margin-bottom: 10px;
            border: 2px solid #ffc9c9;
            position: relative;
        }

        #meter-fill {
            background: linear-gradient(to right, #ff9a9e, #fecfef, #ff8787);
            height: 100%;
            width: 0%; /* 시작 온도 */
            transition: width 0.5s ease-out;
            border-radius: 18px;
        }

        #temp-text { font-weight: bold; color: var(--primary-color); margin-bottom: 30px; display: block; }

        /* 상황 및 속마음 스타일 */
        .stage-info { font-size: 0.9rem; color: #aaa; margin-bottom: 5px; text-align: left; }
        
        .situation-box {
            background-color: #fff9db;
            border-left: 6px solid var(--accent-color);
            padding: 20px;
            border-radius: 10px;
            text-align: left;
            margin-bottom: 20px;
            font-size: 1.1rem;
            line-height: 1.6;
            font-weight: 500;
        }

        .thought-box {
            background-color: #fff5f5;
            border: 2px dashed var(--thought-color);
            color: var(--thought-color);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            font-style: italic;
            font-size: 1rem;
            display: none; /* 처음엔 숨김 */
        }

        /* 버튼 스타일 */
        .btn-container { display: flex; flex-direction: column; gap: 15px; }

        .btn {
            background: none;
            border: 2px solid #ffc9c9;
            padding: 18px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1.05rem;
            transition: all 0.2s ease;
            text-align: left;
            line-height: 1.4;
        }

        .btn:hover {
            background-color: var(--bg-color);
            border-color: var(--primary-color);
            transform: translateY(-3px);
        }

        .btn-thought {
            background-color: var(--primary-color);
            color: white;
            border: none;
            font-weight: bold;
            text-align: center;
        }
        .btn-thought:hover { background-color: #fa5252; }

        /* 결과 화면 */
        #result-screen { display: none; }
        .final-msg { font-size: 1.3rem; line-height: 1.8; margin-bottom: 30px; color: var(--text-color); }
        .high-temp { color: var(--primary-color); font-weight: bold; font-size: 1.5rem; }
    </style>
</head>
<body>

<div class="game-container">
    <h1>👟 마음 온도계: 타인의 신발을 신어봐!</h1>
    <p class="sub-title">갈등 상황에서 상대방의 입장을 이해하고, 따뜻한 배려의 선택을 해주세요.</p>

    <div class="meter-container">
        <div id="meter-fill"></div>
    </div>
    <span id="temp-text">현재 마음 온도: 0°C</span>

    <div id="game-screen">
        <div class="stage-info" id="stage-number">단계 1/10</div>
        <div class="situation-box" id="situation-text">상황 로딩 중...</div>
        
        <button class="btn btn-thought" id="thought-btn" onclick="showThought()">💡 먼저 친구의 속마음 확인하기</button>
        
        <div class="thought-box" id="thought-text">속마음 로딩 중...</div>

        <div class="btn-container" id="choice-container" style="display:none;">
            </div>
    </div>

    <div id="result-screen">
        <h2>🎉 퀘스트 완료!</h2>
        <p class="final-msg">
            10단계의 어려운 상황 속에서도<br>
            상대방의 입장을 먼저 생각하려 노력했군요!<br>
            당신의 최종 마음 온도는 <span class="high-temp" id="final-temp"></span>입니다.
        </p>
        <button class="btn btn-thought" onclick="location.reload()">다시 시작하기</button>
    </div>
</div>

<script>
    // 10단계 시나리오 데이터
    const scenarios = [
        {
            sit: "친구에게 소중한 펜을 빌려줬는데, 망가뜨려서 돌려주었다.",
            thought: "사실 친구는 사과하고 싶었지만, 너무 미안하고 당황해서 말이 입 밖으로 나오지 않는 상태야.",
            choices: [
                { text: "버럭 화를 내며 '왜 함부로 써!'라고 쏘아붙인다.", score: -10 },
                { text: "'괜찮아, 실수할 수도 있지. 대신 다음엔 조심해줘'라고 너그럽게 말한다.", score: 10 },
                { text: "아무 말 없이 펜을 뺏고, 앞으로 그 친구와 말하지 않는다.", score: -5 }
            ]
        },
        {
            sit: "급식 시간, 친구가 내 발을 세게 밟고도 사과 없이 그냥 지나간다.",
            thought: "사실 친구는 뒤에서 밀치는 힘 때문에 중심을 잃었고, 본인이 발을 밟았다는 사실조차 모를 정도로 정신이 없어.",
            choices: [
                { text: "나도 똑같이 친구 발을 밟아 복수한다.", score: -10 },
                { text: "뒤쫓아가서 '야! 발 밟았으면 사과해야지!'라고 소리친다.", score: -5 },
                { text: "'무슨 일 있나? 되게 급해 보이네'라며 일단 오해를 접어둔다.", score: 10 }
            ]
        },
        {
            sit: "모둠 활동 시간, 한 친구가 아무 의견도 내지 않고 구석에만 앉아 있다.",
            thought: "그 친구는 사실 발표 공포증이 심해서, 의견을 냈다 혹시 비웃음을 살까 봐 심장이 터질 듯이 뛰고 있어.",
            choices: [
                { text: "'넌 왜 아무것도 안 해? 무임승차하지 마'라고 비난한다.", score: -10 },
                { text: "'넌 할 줄 아는 게 없구나'라며 한심하다는 듯 쳐다본다.", score: -10 },
                { text: "조용히 다가가 '혹시 의견 내기 부담스러우면, 자료 조사를 맡아볼래?'라고 제안한다.", score: 10 }
            ]
        },
        {
            sit: "내 생일 파티에 가장 친한 친구가 '학원' 때문에 못 온다고 한다. 서운하다.",
            thought: "친구는 사실 최근 부모님 경제 사정이 어려워져서 네 생일 선물을 살 돈이 없어 미안해서 못 가는 거야.",
            choices: [
                { text: "'학원이 나보다 중요해?'라며 절교를 선언한다.", score: -10 },
                { text: "'아쉽다.. 그래도 다음엔 꼭 같이 놀자!'라고 이해해준다.", score: 10 },
                { text: "'다른 애들은 다 오는데 너만 안 오네'라며 눈치를 준다.", score: -5 }
            ]
        },
        {
            sit: "SNS에 나만 빼고 다른 친구들끼리 즐겁게 찍은 사진이 올라왔다.",
            thought: "친구들은 네가 그날 아파서 결석했기 때문에 서운해할까 봐 일부러 연락을 안 했던 건데, 그게 오히려 소외감을 준 거야.",
            choices: [
                { text: "그 사진에 '나 빼고 노니까 좋냐?'라고 댓글을 단다.", score: -5 },
                { text: "다음 날 학교에 가서 '어제 재미있었겠다! 담엔 나도 컨디션 조절 잘해서 같이 갈게'라고 먼저 말한다.", score: 10 },
                { text: "나도 보란 듯이 다른 애들과 찍은 사진을 올린다.", score: -5 }
            ]
        },
        {
            sit: "청소 시간, 청소함 정리를 도맡아 하던 친구가 갑자기 짜증을 내며 빗자루를 던진다.",
            thought: "이 친구는 지난 일주일 내내 혼자서만 정리를 해왔어. 아무도 '고맙다'거나 '같이 하자'고 말해주지 않아 지친 상태야.",
            choices: [
                { text: "'왜 갑자기 짜증이야? 네가 하기로 했잖아'라고 따진다.", score: -10 },
                { text: "무시하고 내 청소 구역만 청소한다.", score: -5 },
                { text: "친구의 빗자루를 주우며 '미안, 너한테만 너무 맡겼네. 오늘은 같이 정리하자'라고 말한다.", score: 10 }
            ]
        },
        {
            sit: "전학 온 친구가 우리 반의 규칙이나 분위기를 자꾸 망가뜨려서 짜증이 난다.",
            thought: "사실 이 친구는 전 학교에서 따돌림을 당했던 기억 때문에, 센 척을 해서라도 자신을 보호하려고 방어막을 치는 중이야.",
            choices: [
                { text: "'우리 반 규칙이니까 지켜!'라며 아이들 앞에서 면박을 준다.", score: -5 },
                { text: "조용히 다가가 '이 규칙은 우리가 편하려고 만든 거야. 조금씩 같이 익숙해져 보자'라며 도와준다.", score: 10 },
                { text: "'전학생 주제에..'라며 뒤에서 험담을 한다.", score: -15 }
            ]
        },
        {
            sit: "선생님께서 나에게만 유독 엄하게 꾸중을 하시는 것 같아 억울하고 서운하다.",
            thought: "선생님은 사실 네가 우리 반에서 가장 잠재력이 크다고 믿고 계셔. 네가 조금만 더 바르게 성장하면 리더가 될 거라 기대하며 애정을 쏟는 중이야.",
            choices: [
                { text: "선생님 눈을 피하고 반항적인 태도를 보인다.", score: -5 },
                { text: "'네, 알겠습니다'라고 대답하고 속으로는 '싫어'라고 생각한다.", score: 0 },
                { text: "선생님의 말씀 속 '꾸중'보다 '나에 대한 기대'를 떠올리며 행동을 고치려 노력한다.", score: 10 }
            ]
        },
        {
            sit: "비 오는 등굣길, 폐지를 실은 할아버지의 리어카 때문에 차가 막혀 지각할 것 같다.",
            thought: "할아버지는 비에 젖어 무거워진 종이 뭉치 때문에 팔다리가 저려오지만, 오늘 이걸 팔지 못하면 저녁 식사를 거르셔야 해.",
            choices: [
                { text: "창문을 내리고 '할아버지 빨리 좀 가세요!'라고 소리친다.", score: -15 },
                { text: "'비 오는 날 왜 나오셔서..'라며 할아버지를 탓한다.", score: -10 },
                { text: "'지각하더라도 할아버지 건강이 더 걱정돼..'라며 할아버지가 안전하게 가시길 마음속으로 응원한다.", score: 10 }
            ]
        },
        {
            sit: "사람들이 고장 난 인공지능(AI) 로봇을 발로 차며 화풀이를 하고 있다.",
            thought: "로봇은 감정이 없지만, 이를 지켜보는 어린아이들은 '생명이 없으면 함부로 대해도 된다'는 무서운 가치관을 배우게 될지도 몰라.",
            choices: [
                { text: "'로봇이니까 괜찮아'라며 나도 같이 발로 찬다.", score: -10 },
                { text: "그냥 상관하지 않고 지나간다.", score: 0 },
                { text: "폭력적인 행동은 어떤 대상에게든 옳지 않다고 생각하며, AI윤리에 대해 다시 한번 고민해본다.", score: 10 }
            ]
        }
    ];

    let currentIdx = 0;
    let temperature = 0; // 시작 온도 0도

    // 상황 요소 로딩
    const stageNumEl = document.getElementById('stage-number');
    const sitTextEl = document.getElementById('situation-text');
    const thoughtBtnEl = document.getElementById('thought-btn');
    const thoughtTextEl = document.getElementById('thought-text');
    const choiceContainerEl = document.getElementById('choice-container');
    const meterFillEl = document.getElementById('meter-fill');
    const tempTextEl = document.getElementById('temp-text');

    // 게임 시작 및 화면 렌더링
    function renderScenario() {
        const scenario = scenarios[currentIdx];
        
        // 초기화
        stageNumEl.innerText = `단계 ${currentIdx + 1} / 10`;
        sitTextEl.innerText = "📍 상황: " + scenario.sit;
        thoughtTextEl.innerText = scenario.thought;
        
        // 속마음 숨기기, 버튼 보이기
        thoughtTextEl.style.display = 'none';
        thoughtBtnEl.style.display = 'block';
        choiceContainerEl.style.display = 'none';
        choiceContainerEl.innerHTML = ''; // 이전 선택지 삭제

        // 선택지 생성
        scenario.choices.forEach(choice => {
            const button = document.createElement('button');
            button.className = 'btn';
            button.innerText = choice.text;
            button.onclick = () => selectChoice(choice.score);
            choiceContainerEl.appendChild(button);
        });
    }

    // 속마음 보여주기
    function showThought() {
        thoughtBtnEl.style.display = 'none';
        thoughtTextEl.style.display = 'block';
        choiceContainerEl.style.display = 'flex'; // 선택지 보이기
    }

    // 선택지 클릭 시 점수 계산 및 다음 단계
    function selectChoice(score) {
        // 온도 업데이트 (0도 미만, 100도 초과 방지)
        temperature = Math.min(100, Math.max(0, temperature + score));
        
        // 온도계 애니메이션 및 텍스트 업데이트
        meterFillEl.style.width = temperature + '%';
        tempTextEl.innerText = `현재 마음 온도: ${temperature}°C`;

        currentIdx++;

        if (currentIdx < scenarios.length) {
            // 다음 단계 렌더링 (약간의 지연을 주어 온도계 올라가는 걸 보게 함)
            setTimeout(renderScenario, 500);
        } else {
            // 게임 종료 화면
            setTimeout(showResult, 500);
        }
    }

    // 결과 화면 보여주기
    function showResult() {
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        
        const finalTempEl = document.getElementById('final-temp');
        finalTempEl.innerText = temperature + '°C';

        // 온도에 따른 메시지 변경
        const msgEl = document.querySelector('.final-msg');
        if (temperature >= 90) {
            msgEl.innerHTML += "<br><br>🌟 당신은 주변의 모든 마음을 따뜻하게 녹여주는 **'인간 햇살'**이군요! 정말 멋진 배려심을 가졌어요.";
        } else if (temperature >= 70) {
            msgEl.innerHTML += "<br><br>😊 타인의 입장을 먼저 이해하려는 **'따뜻한 마음'**을 가진 학생이군요! 조금만 더 노력하면 완벽한 공감왕이 될 거예요.";
        } else {
            msgEl.innerHTML += "<br><br>😐 아직은 내 마음이 조금 더 중요한가 봐요. **'역지사지'**의 마음으로 상대방의 신발을 신어보는 연습을 더 해볼까요?";
        }
    }

    // 초기 실행
    renderScenario();
</script>

</body>
</html>
